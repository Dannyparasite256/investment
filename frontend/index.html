<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#09090B" />
    <meta name="description" content="CryptoInvest — Premium cryptocurrency investment platform" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>CryptoInvest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('ci_theme') || 'dark'
          document.documentElement.setAttribute('data-theme', t)
        } catch (e) {}
        // Bust stale service-worker / Cache Storage after SPA deploys (PythonAnywhere)
        try {
          var KEY = 'ci_cache_bust'
          var VER = 'crypto-icons-v3'
          if (localStorage.getItem(KEY) !== VER) {
            localStorage.setItem(KEY, VER)
            var done = function () { location.reload() }
            var tasks = []
            if ('serviceWorker' in navigator) {
              tasks.push(
                navigator.serviceWorker.getRegistrations().then(function (regs) {
                  return Promise.all(regs.map(function (r) { return r.unregister() }))
                })
              )
            }
            if (typeof caches !== 'undefined') {
              tasks.push(
                caches.keys().then(function (keys) {
                  return Promise.all(keys.map(function (k) { return caches.delete(k) }))
                })
              )
            }
            Promise.all(tasks).then(done).catch(done)
          }
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
