{% extends "base_app.html" %}
{% block title %}Add wallet address — {{ SITE_NAME }}{% endblock %}
{% block page_title %}Add wallet address{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="glass-card p-4">
      <form method="post">
        {% csrf_token %}
        <div class="mb-3"><label class="form-label">Currency</label>{{ form.cryptocurrency }}</div>
        <div class="mb-3"><label class="form-label">Address</label>{{ form.address }}</div>
        <div class="mb-3"><label class="form-label">Label</label>{{ form.label }}</div>
        <div class="form-check mb-4">{{ form.is_default }} <label class="form-check-label" for="id_is_default">Default</label></div>
        <button type="submit" class="btn btn-ci w-100">Save address</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
