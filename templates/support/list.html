{% extends "base_app.html" %}
{% block page_title %}Support tickets{% endblock %}
{% block content %}
<div class="d-flex justify-content-end mb-3"><a href="{% url 'support:create' %}" class="btn btn-ci btn-sm">New ticket</a></div>
<div class="glass-card p-0 overflow-hidden">
<table class="table table-ci mb-0">
<thead><tr><th>Subject</th><th>Status</th><th>Updated</th></tr></thead>
<tbody>
{% for t in page %}
<tr><td><a href="{% url 'support:detail' t.pk %}">{{ t.subject }}</a></td>
<td><span class="badge badge-status badge-info">{{ t.get_status_display }}</span></td>
<td class="small text-muted">{{ t.updated_at|date:"M d H:i" }}</td></tr>
{% empty %}<tr><td colspan="3" class="text-center text-muted py-4">No tickets</td></tr>{% endfor %}
</tbody></table></div>
{% endblock %}
