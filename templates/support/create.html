{% extends "base_app.html" %}
{% block page_title %}Contact support{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-6">
<div class="glass-card p-4">
<form method="post">{% csrf_token %}
  <div class="mb-3"><label class="form-label">Subject</label><input class="form-control" name="subject" required></div>
  <div class="mb-3"><label class="form-label">Category</label>
    <select class="form-select" name="category">
      <option value="general">General</option>
      <option value="deposit">Deposit</option>
      <option value="withdrawal">Withdrawal</option>
      <option value="investment">Investment</option>
      <option value="kyc">KYC</option>
      <option value="technical">Technical</option>
    </select>
  </div>
  <div class="mb-3"><label class="form-label">Message</label><textarea class="form-control" name="body" rows="5" required></textarea></div>
  <button class="btn btn-ci w-100">Submit ticket</button>
</form>
</div></div></div>
{% endblock %}
