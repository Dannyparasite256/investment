{% extends "base_auth.html" %}
{% block title %}Reset password — {{ SITE_NAME }}{% endblock %}
{% block auth_subtitle %}We'll email you a reset link{% endblock %}

{% block content %}
<form method="post">
  {% csrf_token %}
  <div class="mb-3">
    <label class="form-label">Email</label>
    {{ form.email }}
  </div>
  <button type="submit" class="btn btn-ci w-100 mb-3">Send reset link</button>
  <p class="text-center small mb-0"><a href="{% url 'accounts:login' %}">Back to login</a></p>
</form>
{% endblock %}
