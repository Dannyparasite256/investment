{% extends "staffpanel/base.html" %}
{% block page_title %}{% if plan %}Edit plan{% else %}New plan{% endif %}{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-8">
<div class="glass-card p-4">
<form method="post">{% csrf_token %}
  <div class="row g-3">
    <div class="col-md-6"><label class="form-label">Name</label><input class="form-control" name="name" value="{{ plan.name|default:'' }}" required></div>
    <div class="col-md-6"><label class="form-label">Slug</label><input class="form-control" name="slug" value="{{ plan.slug|default:'' }}" placeholder="auto from name"></div>
    <div class="col-12"><label class="form-label">Description</label><textarea class="form-control" name="description" rows="3">{{ plan.description|default:'' }}</textarea></div>
    <div class="col-md-4"><label class="form-label">Min deposit</label><input class="form-control" name="min_deposit" value="{{ plan.min_deposit|default:'50' }}"></div>
    <div class="col-md-4"><label class="form-label">Max deposit</label><input class="form-control" name="max_deposit" value="{{ plan.max_deposit|default:'10000' }}"></div>
    <div class="col-md-4"><label class="form-label">Duration (days)</label><input class="form-control" name="duration_days" value="{{ plan.duration_days|default:'30' }}"></div>
    <div class="col-md-4"><label class="form-label">Profit rate % / period</label><input class="form-control" name="profit_rate_percent" value="{{ plan.profit_rate_percent|default:'1' }}"></div>
    <div class="col-md-4"><label class="form-label">Return min %</label><input class="form-control" name="return_percent_min" value="{{ plan.return_percent_min|default:'0' }}"></div>
    <div class="col-md-4"><label class="form-label">Return max %</label><input class="form-control" name="return_percent_max" value="{{ plan.return_percent_max|default:'0' }}"></div>
    <div class="col-md-4"><label class="form-label">Profit method</label>
      <select class="form-select" name="profit_method">{% for v,l in profit_methods %}<option value="{{ v }}" {% if plan.profit_method == v %}selected{% endif %}>{{ l }}</option>{% endfor %}</select>
    </div>
    <div class="col-md-4"><label class="form-label">Payout frequency</label>
      <select class="form-select" name="payout_frequency">{% for v,l in payout_freqs %}<option value="{{ v }}" {% if plan.payout_frequency == v %}selected{% endif %}>{{ l }}</option>{% endfor %}</select>
    </div>
    <div class="col-md-4"><label class="form-label">Risk</label>
      <select class="form-select" name="risk_level">{% for v,l in risk_levels %}<option value="{{ v }}" {% if plan.risk_level == v %}selected{% endif %}>{{ l }}</option>{% endfor %}</select>
    </div>
    <div class="col-md-4"><label class="form-label">Status</label>
      <select class="form-select" name="status">{% for v,l in statuses %}<option value="{{ v }}" {% if plan.status == v %}selected{% endif %}>{{ l }}</option>{% endfor %}</select>
    </div>
    <div class="col-12">
      <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" name="is_featured" {% if plan.is_featured %}checked{% endif %}><label class="form-check-label">Featured</label></div>
      <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" name="allow_auto_reinvest" {% if plan.allow_auto_reinvest or not plan %}checked{% endif %}><label class="form-check-label">Auto reinvest</label></div>
      <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" name="allow_manual_reinvest" {% if plan.allow_manual_reinvest or not plan %}checked{% endif %}><label class="form-check-label">Manual reinvest</label></div>
      <div class="form-check form-check-inline"><input class="form-check-input" type="checkbox" name="return_principal" {% if plan.return_principal or not plan %}checked{% endif %}><label class="form-check-label">Return principal</label></div>
    </div>
  </div>
  <button class="btn btn-ci mt-4" type="submit">Save plan</button>
</form>
</div></div></div>
{% endblock %}
