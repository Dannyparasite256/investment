{% extends "staffpanel/base.html" %}
{% block page_title %}Platform settings{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-7">
<div class="glass-card p-4">
<form method="post">{% csrf_token %}
  <div class="mb-3"><label class="form-label">Site name</label><input class="form-control" name="site_name" value="{{ cfg.site_name }}"></div>
  <div class="mb-3"><label class="form-label">Support email</label><input class="form-control" name="support_email" value="{{ cfg.support_email }}"></div>
  <div class="row g-2 mb-3">
    <div class="col-md-4"><label class="form-label">Min withdrawal</label><input class="form-control" name="min_withdrawal" value="{{ cfg.min_withdrawal }}"></div>
    <div class="col-md-4"><label class="form-label">Max withdrawal</label><input class="form-control" name="max_withdrawal" value="{{ cfg.max_withdrawal }}"></div>
    <div class="col-md-4"><label class="form-label">Referral %</label><input class="form-control" name="referral_bonus_percent" value="{{ cfg.referral_bonus_percent }}"></div>
  </div>
  <div class="mb-3"><label class="form-label">Session timeout (minutes)</label><input class="form-control" name="session_timeout_minutes" value="{{ cfg.session_timeout_minutes }}"></div>
  <div class="form-check mb-3"><input class="form-check-input" type="checkbox" name="maintenance_mode" {% if cfg.maintenance_mode %}checked{% endif %}><label class="form-check-label">Maintenance mode</label></div>
  <div class="mb-3"><label class="form-label">Maintenance message</label><textarea class="form-control" name="maintenance_message" rows="2">{{ cfg.maintenance_message }}</textarea></div>
  <div class="mb-3"><label class="form-label">Global announcement</label><textarea class="form-control" name="announcement" rows="2">{{ cfg.announcement }}</textarea></div>
  <button class="btn btn-ci">Save settings</button>
</form>
</div></div></div>
{% endblock %}
