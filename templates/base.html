{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="{{ theme|default:'dark' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="{{ SITE_NAME }} — Premium cryptocurrency investment platform">
  <meta name="theme-color" content="#060816">
  <title>{% block title %}{{ SITE_NAME }}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{% static 'css/app.css' %}?v=dashcurrency1" rel="stylesheet">
  <link rel="manifest" href="{% url 'core:manifest' %}">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="{% static 'img/icon-192.png' %}">
  {% block extra_css %}{% endblock %}
</head>
<body {% if user.is_authenticated %}data-user-authenticated="1"{% endif %}>
  {% csrf_token %}
  <div class="bg-orbs" aria-hidden="true"><span></span><span></span><span></span></div>
  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:1090"></div>
  <div id="app" class="page-transition">
    {% block body %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="{% static 'js/app.js' %}?v=dashcurrency1"></script>
  <script src="{% static 'js/ux.js' %}?v=dashcurrency1"></script>
  <script>
    // Persist browser timezone for accurate local timestamps server-side
    (function () {
      try {
        var tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
        if (!tz) return;
        var existing = document.cookie.split(';').map(function (c) { return c.trim(); })
          .find(function (c) { return c.startsWith('user_tz='); });
        var cur = existing ? decodeURIComponent(existing.split('=').slice(1).join('=')) : '';
        if (cur !== tz) {
          document.cookie = 'user_tz=' + encodeURIComponent(tz) + ';path=/;max-age=31536000;samesite=lax';
        }
      } catch (e) {}
    })();
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
