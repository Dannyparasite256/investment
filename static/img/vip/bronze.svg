<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8A06A"/>
      <stop offset="45%" stop-color="#CD7F32"/>
      <stop offset="100%" stop-color="#8B4513"/>
    </linearGradient>
    <radialGradient id="bGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFB366" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#CD7F32" stop-opacity="0"/>
    </radialGradient>
    <filter id="bSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="90" fill="url(#bGlow)">
    <animate attributeName="r" values="86;94;86" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.55;0.95;0.55" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <g filter="url(#bSoft)">
    <path d="M100 28 L128 48 L148 78 L148 122 L128 152 L100 172 L72 152 L52 122 L52 78 Z" fill="url(#bMetal)" stroke="#FFD4A8" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="-2 100 100;2 100 100;-2 100 100" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>
  <circle cx="100" cy="100" r="38" fill="#2A1810" stroke="#FFD4A8" stroke-width="2.5"/>
  <text x="100" y="112" text-anchor="middle" font-size="40">🥉</text>
  <circle cx="100" cy="100" r="78" fill="none" stroke="#E8A06A" stroke-width="1.5" stroke-dasharray="4 10" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="-360 100 100" dur="10s" repeatCount="indefinite"/>
  </circle>
</svg>
