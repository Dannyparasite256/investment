    <text x="100" y="116" text-anchor="middle" font-size="42">👑</text>
  </g>
  <circle cx="100" cy="100" r="84" fill="none" stroke="#7DD3FC" stroke-width="2" stroke-dasharray="3 7">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="5s" repeatCount="indefinite"/>
  </circle>
</svg>
