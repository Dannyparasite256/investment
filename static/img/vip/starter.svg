<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="sRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64748B"/>
      <stop offset="100%" stop-color="#94A3B8"/>
    </linearGradient>
    <radialGradient id="sGlow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#CBD5E1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#64748B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="88" fill="url(#sGlow)">
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="100" r="72" fill="none" stroke="url(#sRing)" stroke-width="6" stroke-dasharray="12 8">
    <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="100" r="54" fill="#1E293B" stroke="#94A3B8" stroke-width="3"/>
  <text x="100" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="42" font-weight="800" fill="#E2E8F0">★</text>
  <text x="100" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#94A3B8" letter-spacing="2">STARTER</text>
</svg>
